<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Patient Registration | CityCare Hospital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { background: white; border-radius: 20px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #1e293b; font-size: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .header h1 i { color: #3b82f6; }
        .back-btn { background: #f1f5f9; color: #64748b; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-btn:hover { background: #e2e8f0; color: #3b82f6; }
        
        .form-card { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .form-title { color: #1e293b; font-size: 1.3rem; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .form-title i { color: #3b82f6; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #334155; font-weight: 600; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; transition: all 0.3s; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        .form-group.full { grid-column: 1 / -1; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn { padding: 14px 30px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-primary { background: linear-gradient(135deg, #1e3a5f, #2d5a87); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(30,58,95,0.3); }
        .btn-secondary { background: #f1f5f9; color: #64748b; }
        .btn-secondary:hover { background: #e2e8f0; }
        
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-plus"></i> New Patient Registration</h1>
<script src="goToDashboard.js"></script>
<a href="#" class="back-btn" onclick="goToDashboard(); return false;">
<i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        
        <div class="form-card">
            <h2 class="form-title"><i class="fas fa-id-card"></i> Patient Information</h2>
            <form id="patientForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Patient Name</label>
                        <input type="text" id="patientName" placeholder="Enter full name" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar-alt"></i> Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-venus-mars"></i> Gender</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Address</label>
                        <input type="text" id="address" placeholder="Full address">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-stethoscope"></i> Department</label>
                        <select id="department" required>
                            <option value="">Select Department</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Orthopedics">Orthopedics</option>
                            <option value="Pediatrics">Pediatrics</option>
                            <option value="Gynecology">Gynecology</option>
                            <option value="General Medicine">General Medicine</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Ophthalmology">Ophthalmology</option>
                            <option value="ENT">ENT</option>
                            <option value="Psychiatry">Psychiatry</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-md"></i> Doctor</label>
                        <select id="doctor" required>
                            <option value="">Select Doctor</option>
                            <option value="Dr. Rahul Sharma">Dr. Rahul Sharma (Cardiology)</option>
                            <option value="Dr. Priya Singh">Dr. Priya Singh (Neurology)</option>
                            <option value="Dr. Amit Kumar">Dr. Amit Kumar (Orthopedics)</option>
                            <option value="Dr. Sunita Rao">Dr. Sunita Rao (Pediatrics)</option>
                            <option value="Dr. Rajesh Kumar">Dr. Rajesh Kumar (General Medicine)</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label><i class="fas fa-notes-medical"></i> Symptoms / Reason for Visit</label>
                        <textarea id="symptoms" rows="3" placeholder="Describe symptoms or reason for visit"></textarea>
                    </div>
                    <div class="form-group full">
                        <label><i class="fas fa-file-medical-alt"></i> Medical History (if any)</label>
                        <textarea id="medicalHistory" rows="2" placeholder="Any existing medical conditions, allergies, etc."></textarea>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Register Patient</button>
                    <button type="reset" class="btn btn-secondary"><i class="fas fa-redo"></i> Reset</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('patientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Patient Registered Successfully!\n\nPatient Name: ' + document.getElementById('patientName').value + '\nDepartment: ' + document.getElementById('department').value + '\nDoctor: ' + document.getElementById('doctor').value);
            this.reset();
        });
    </script>
</body>
</html>
