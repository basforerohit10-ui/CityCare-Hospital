<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Appointment | CityCare Hospital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .header { background: white; border-radius: 20px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #1e293b; font-size: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .header h1 i { color: #3b82f6; }
        .back-btn { background: #f1f5f9; color: #64748b; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-btn:hover { background: #e2e8f0; color: #3b82f6; }
        
        .form-card { background: white; border-radius: 20px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .form-title { color: #1e293b; font-size: 1.3rem; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .form-title i { color: #3b82f6; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #334155; font-weight: 600; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; transition: all 0.3s; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        .form-group.full { grid-column: 1 / -1; }
        
        .time-slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .time-slot { padding: 12px; text-align: center; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 500; }
        .time-slot:hover { border-color: #3b82f6; background: #eff6ff; }
        .time-slot.selected { background: #3b82f6; color: white; border-color: #3b82f6; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn { padding: 14px 30px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-primary { background: linear-gradient(135deg, #1e3a5f, #2d5a87); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(30,58,95,0.3); }
        .btn-secondary { background: #f1f5f9; color: #64748b; }
        
        .confirmation-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .confirmation-card {
            background: white; border-radius: 20px; padding: 40px; max-width: 500px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: bounceIn 0.5s ease;
        }
        @keyframes bounceIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .time-slots { grid-template-columns: repeat(2, 1fr); } .header { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-calendar-plus"></i> Schedule Appointment</h1>
            <a href="doctor_login.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        
        <div class="form-card">
            <h2 class="form-title"><i class="fas fa-user-plus"></i> Patient & Appointment Details</h2>
            <form id="scheduleForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Patient Name</label>
                        <input type="text" id="patientName" placeholder="Enter patient name" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-stethoscope"></i> Department</label>
                        <select id="department" required>
                            <option value="">Select Department</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Orthopedics">Orthopedics</option>
                            <option value="Pediatrics">Pediatrics</option>
                            <option value="Gynecology">Gynecology</option>
                            <option value="General Medicine">General Medicine</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-md"></i> Doctor</label>
                        <select id="doctor" required>
                            <option value="">Select Doctor</option>
                            <option value="Dr. Rahul Sharma">Dr. Rahul Sharma (Cardiology)</option>
                            <option value="Dr. Priya Singh">Dr. Priya Singh (Neurology)</option>
                            <option value="Dr. Amit Kumar">Dr. Amit Kumar (Orthopedics)</option>
                            <option value="Dr. Sunita Rao">Dr. Sunita Rao (Pediatrics)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Appointment Date</label>
                        <input type="date" id="appDate" required>
                    </div>
                    <div class="form-group full">
                        <label><i class="fas fa-clock"></i> Select Time Slot</label>
                        <div class="time-slots">
                            <div class="time-slot" onclick="selectTime(this)">09:00 AM</div>
                            <div class="time-slot" onclick="selectTime(this)">09:30 AM</div>
                            <div class="time-slot" onclick="selectTime(this)">10:00 AM</div>
                            <div class="time-slot" onclick="selectTime(this)">10:30 AM</div>
                            <div class="time-slot" onclick="selectTime(this)">11:00 AM</div>
                            <div class="time-slot" onclick="selectTime(this)">11:30 AM</div>
                            <div class="time-slot" onclick="selectTime(this)">02:00 PM</div>
                            <div class="time-slot" onclick="selectTime(this)">02:30 PM</div>
                            <div class="time-slot" onclick="selectTime(this)">03:00 PM</div>
                            <div class="time-slot" onclick="selectTime(this)">03:30 PM</div>
                            <div class="time-slot" onclick="selectTime(this)">04:00 PM</div>
                            <div class="time-slot" onclick="selectTime(this)">04:30 PM</div>
                        </div>
                    </div>
                    <div class="form-group full">
                        <label><i class="fas fa-notes-medical"></i> Reason for Visit</label>
                        <textarea id="reason" rows="3" placeholder="Describe the reason for appointment"></textarea>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Confirm Appointment</button>
                    <button type="reset" class="btn btn-secondary"><i class="fas fa-redo"></i> Reset</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="confirmation-modal" id="confirmationModal">
        <div class="confirmation-card">
            <i class="fas fa-check-circle" style="font-size: 64px; color: #10b981; margin-bottom: 20px;"></i>
            <h2 style="color: #1e293b; margin-bottom: 15px;">Appointment Booked Successfully!</h2>
            <div id="bookingDetails" style="background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 25px; text-align: left; font-size: 15px;">
                Loading details...
            </div>
            <button onclick="closeConfirmation()" class="btn btn-primary" style="width: 100%;"><i class="fas fa-arrow-right"></i> Go to Dashboard</button>
        </div>
    </div>

    <script>
        function selectTime(element) {
            document.querySelectorAll('.time-slot').forEach(slot => slot.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        document.getElementById('scheduleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const appointmentData = {
                patientName: document.getElementById('patientName').value,
                phone: document.getElementById('phone').value,
                department: document.getElementById('department').value,
                doctor: document.getElementById('doctor').value,
                appTime: document.querySelector('.time-slot.selected') ? document.querySelector('.time-slot.selected').textContent.trim() : 'TBD',
                appDate: document.getElementById('appDate').value,
                reason: document.getElementById('reason').value,
                id: 'APP-' + Date.now(),
                status: 'Confirmed',
                timestamp: Date.now()
            };
            
            // Save to localStorage for doctor portal
            let appointments = JSON.parse(localStorage.getItem('appointments') || '[]');
            appointments.push(appointmentData);
            localStorage.setItem('appointments', JSON.stringify(appointments));
            
            // Show beautiful confirmation
            document.getElementById('bookingDetails').innerHTML = `
                <strong>Patient:</strong> ${appointmentData.patientName}<br>
                <strong>Phone:</strong> ${appointmentData.phone}<br>
                <strong>Date:</strong> ${new Date(appointmentData.appDate).toLocaleDateString('en-IN')}<br>
                <strong>Time:</strong> ${appointmentData.appTime}<br>
                <strong>Doctor:</strong> ${appointmentData.doctor}<br>
                <strong>Department:</strong> ${appointmentData.department}
            `;
            document.getElementById('confirmationModal').style.display = 'flex';
        });
        
        function closeConfirmation() {
            document.getElementById('confirmationModal').style.display = 'none';
            window.location.href = 'doctor_login.html';
        }
    </script>
</body>
</html>
